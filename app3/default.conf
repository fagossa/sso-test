server {
  listen 80;
  server_name localhost;

  # Redirect root to app1
  location = / {
    return 302 /app1/;
  }

  # Proxy /app1/ to the app1 container
  location /app1/ {
    proxy_pass http://app1:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_buffering off;
    # If backend is unavailable, show a friendly static page instead of 502
    error_page 502 = /app1_unavailable.html;
  }

  # Proxy /app2/ to the app2 container
  location /app2/ {
    proxy_pass http://app2:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_send_timeout 5s;
    proxy_buffering off;
    # If backend is unavailable, show a friendly static page instead of 502
    error_page 502 = /app2_unavailable.html;
  }

  # Fallback pages when backends are down
  location = /app1_unavailable.html {
    root /usr/share/nginx/html;
  }

  location = /app2_unavailable.html {
    root /usr/share/nginx/html;
  }
}
